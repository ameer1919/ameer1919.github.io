<input id="binInput" type="text" placeholder="Enter binary (e.g. 1011)" />
<p id="display"></p>

<script>
  const input = document.getElementById("binInput");
  const display = document.getElementById("display");

  input.addEventListener("input", () => {
    const value = input.value.trim();

    // validate: only 0s and 1s
    if (!/^[01]+$/.test(value)) {
      display.textContent = "";
      return;
    }

    const decimal = parseInt(value, 2);
    display.textContent = decimal;
  });
</script>
